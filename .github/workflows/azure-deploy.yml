# ═════════════════════════════════════════════════════════════════════════════
# Pipeline CI/CD — eciexpress-prod-reporting (reporting-service, event-driven, sin DB)
# Flujo: build -> test -> deploy. En push a main se compila, se corren los tests y,
# si pasan, se construye la imagen, se sube al ACR y se actualiza el Container App.
#
# Requisitos (GitHub Secrets): AZURE_CLIENT_ID, AZURE_TENANT_ID,
# AZURE_SUBSCRIPTION_ID, ACR_NAME.
# ═════════════════════════════════════════════════════════════════════════════
name: azure-deploy

on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # login OIDC al Service Principal, sin secretos de larga vida

env:
  IMAGE_NAME: reporting-service
  CONTAINER_APP: eciexpress-prod-reporting
  RESOURCE_GROUP: eciexpress-prod-rg

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  test:
    name: test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

  deploy:
    name: deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Build + push con Docker (az acr build / ACR Tasks está bloqueado en esta suscripción).
      - name: Build & push image to ACR
        run: |
          az acr login --name "${{ secrets.ACR_NAME }}"
          docker build \
            -t "${{ secrets.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:production" \
            .
          docker push "${{ secrets.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:production"

      - name: Update Container App image
        # --revision-suffix fuerza una revisión nueva aunque el tag de imagen
        # (":production") no cambie de nombre: sin esto, ACA compara el spec,
        # ve el mismo string de imagen y no crea revisión ni vuelve a hacer pull.
        run: |
          az containerapp update \
            --name "${CONTAINER_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --image "${{ secrets.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:production" \
            --revision-suffix "${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}"

      - name: Cleanup old untagged images
        # ACR Tasks (az acr run / acr purge) está bloqueado en esta suscripción
        # (TasksOperationsNotAllowed). Borramos los manifests sin tag directamente
        # con el data-plane del registry. No falla el deploy si esto da error.
        continue-on-error: true
        run: |
          echo "Cleaning old untagged images..."

          # Al reusar el tag 'production', cada push deja sin tag el manifest anterior.
          # Borramos los manifests sin tag con más de 3 días de antigüedad.
          CUTOFF=$(date -u -d '3 days ago' +%s)

          az acr manifest list-metadata \
            --registry "${{ secrets.ACR_NAME }}" \
            --name "${IMAGE_NAME}" \
            --query "[?tags==null].[digest,lastUpdateTime]" -o tsv \
          | while read -r digest ts; do
              [ -z "$digest" ] && continue
              ts_epoch=$(date -u -d "$ts" +%s 2>/dev/null || echo 0)
              if [ "$ts_epoch" -lt "$CUTOFF" ]; then
                echo "Deleting untagged ${IMAGE_NAME}@$digest ($ts)"
                az acr repository delete --yes \
                  --name "${{ secrets.ACR_NAME }}" \
                  --image "${IMAGE_NAME}@$digest"
              fi
            done

          echo "Cleanup done."
