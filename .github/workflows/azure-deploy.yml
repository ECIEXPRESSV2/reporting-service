# ═════════════════════════════════════════════════════════════════════════════
# Despliegue a Azure Container Apps — eciexpress-prod-reporting
#
# reporting es event-driven y NO tiene base de datos (INVENTARIO §7), por eso este
# workflow NO tiene paso de migraciones. Build de la imagen en el ACR + update del
# Container App al hacer push a main.
#
# Requisitos (ver INFRA_RESUMEN §Bootstrap):
#   - Infra aplicada (ACR + Container App eciexpress-prod-reporting).
#   - GitHub Secrets del repo: AZURE_CLIENT_ID, AZURE_TENANT_ID,
#     AZURE_SUBSCRIPTION_ID, ACR_NAME.
# ═════════════════════════════════════════════════════════════════════════════
name: azure-deploy

on:
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # login OIDC al Service Principal, sin secretos de larga vida

env:
  IMAGE_NAME: reporting-service
  CONTAINER_APP: eciexpress-prod-reporting
  RESOURCE_GROUP: eciexpress-prod-rg

jobs:
  deploy:
    name: build (ACR) -> update Container App
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Build + push con Docker (az acr build / ACR Tasks está bloqueado en esta suscripción).
      - name: Build & push image to ACR
        run: |
          az acr login --name "${{ secrets.ACR_NAME }}"
          docker build \
            -t "${{ secrets.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:production" \
            .
          docker push "${{ secrets.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:production"

      - name: Update Container App image
        run: |
          az containerapp update \
            --name "${CONTAINER_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --image "${{ secrets.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:production"

      - name: Cleanup old untagged images
        run: |
          echo "Cleaning old untagged images..."

          az acr run \
            --registry "${{ secrets.ACR_NAME }}" \
            --cmd "acr purge --filter '${IMAGE_NAME}:.*' --ago 3d --untagged" \
            /dev/null
